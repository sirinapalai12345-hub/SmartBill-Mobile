<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBill Pro - บัญชีผู้ใช้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        :root { --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; padding-bottom: calc(80px + var(--safe-bottom)); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .nav-item.active { color: #2563eb; }
        .page { display: none; }
        .page.active { display: block; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-up { animation: slideUp 0.3s ease-out; }

        /* Custom Toggle Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <!-- หน้าแรก: รายการ -->
    <main id="page-home" class="page active max-w-md mx-auto px-4 pt-6">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">รายการของฉัน</h1>
                <p id="display-date" class="text-sm text-blue-600 font-medium">โหลดข้อมูล...</p>
            </div>
            <button onclick="openFilter()" class="w-10 h-10 rounded-2xl glass shadow-sm flex items-center justify-center text-slate-600">
                <i class="fas fa-sliders-h"></i>
            </button>
        </div>

        <!-- การแจ้งเตือนค้างชำระ -->
        <div id="overdue-banner" class="hidden bg-orange-500 text-white p-4 rounded-2xl mb-6 shadow-lg flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-bell animate-bounce"></i>
                <span class="text-xs font-bold">มีรายการค้างชำระเกินกำหนด!</span>
            </div>
            <button onclick="changeView('pending')" class="text-[10px] bg-white/20 px-3 py-1 rounded-full">ดูเลย</button>
        </div>

        <!-- สรุปยอดเงิน -->
        <div class="glass p-6 rounded-3xl mb-8 shadow-sm border border-white">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">ยอดสุทธิเดือนนี้</p>
            <h2 id="total-balance" class="text-3xl font-bold text-slate-900 mb-6">0.00 ฿</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                <div>
                    <p class="text-[10px] text-slate-400 uppercase">รายรับ</p>
                    <p id="total-inc" class="text-lg font-bold text-emerald-500">0.00</p>
                </div>
                <div class="border-l pl-4">
                    <p class="text-[10px] text-slate-400 uppercase">รายจ่าย</p>
                    <p id="total-exp" class="text-lg font-bold text-rose-500">0.00</p>
                </div>
            </div>
        </div>

        <!-- แถบเลือกสถานะ -->
        <div class="flex gap-6 mb-4 px-2">
            <button onclick="changeView('paid')" id="tab-paid" class="pb-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600">จ่ายแล้ว</button>
            <button onclick="changeView('pending')" id="tab-pending" class="pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400">
                ค้างชำระ <span id="badge-pending" class="hidden ml-1 bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded text-[10px]">0</span>
            </button>
        </div>

        <div id="list-container" class="space-y-3">
            <!-- ข้อมูลจะถูกแสดงที่นี่ -->
        </div>
    </main>

    <!-- หน้าบัญชีผู้ใช้ (Profile) -->
    <main id="page-profile" class="page max-w-md mx-auto px-4 pt-6">
        <h1 class="text-2xl font-bold mb-6 text-slate-900">บัญชีผู้ใช้</h1>
        
        <!-- ส่วนหัวโปรไฟล์ -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center mb-6">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mb-4 relative overflow-hidden">
                <i class="fas fa-user text-4xl text-blue-200"></i>
            </div>
            <h3 id="user-display-id" class="text-lg font-bold text-slate-800">ผู้ใช้งานทั่วไป</h3>
            <p id="user-full-id" class="text-[10px] text-slate-400 truncate w-full text-center mt-1 px-4">กำลังโหลด ID...</p>
        </div>

        <!-- สถิติส่วนตัว -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 text-center">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">จำนวนรายการ</p>
                <p id="stat-count" class="text-xl font-bold text-slate-700">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 text-center">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">สถานะระบบ</p>
                <div class="flex items-center justify-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    <p class="text-sm font-bold text-slate-700">ออนไลน์</p>
                </div>
            </div>
        </div>

        <!-- เมนูตั้งค่า -->
        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100">
            <!-- สวิตช์เปิดปิดการแจ้งเตือน -->
            <div class="p-4 border-b border-slate-50 flex items-center justify-between active:bg-slate-50 transition-colors">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div>
                        <p class="text-sm font-bold">รับการแจ้งเตือน</p>
                        <p id="notif-status" class="text-[10px] text-slate-400 font-light italic">เปิดเพื่อรับข่าวสาร</p>
                    </div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="notif-toggle" onchange="toggleNotifications(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="p-4 border-b border-slate-50 flex items-center justify-between active:bg-slate-50 cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <p class="text-sm font-bold">ความเป็นส่วนตัว</p>
                </div>
                <i class="fas fa-chevron-right text-xs text-slate-300"></i>
            </div>

            <div onclick="location.reload()" class="p-4 flex items-center justify-between active:bg-slate-50 cursor-pointer text-rose-500">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-rose-50 rounded-xl flex items-center justify-center">
                        <i class="fas fa-power-off"></i>
                    </div>
                    <p class="text-sm font-bold">รีเฟรช / ออกจากระบบ</p>
                </div>
            </div>
        </div>
    </main>

    <!-- เมนูนำทางด้านล่าง -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-100 px-10 py-4 flex justify-around items-center z-50">
        <button onclick="showPage('home')" id="nav-home" class="nav-item active flex flex-col items-center">
            <i class="fas fa-list-ul text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">รายการ</span>
        </button>
        <div class="relative -mt-12">
            <button onclick="openForm()" class="w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-xl shadow-blue-200 flex items-center justify-center active:scale-90 transition-transform">
                <i class="fas fa-plus text-xl"></i>
            </button>
        </div>
        <button onclick="showPage('profile')" id="nav-profile" class="nav-item text-slate-300 flex flex-col items-center">
            <i class="fas fa-user-circle text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">บัญชี</span>
        </button>
    </nav>

    <!-- หน้ากากแบบฟอร์ม (Modal) -->
    <div id="modal-form" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-[100] flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-up">
            <div class="flex justify-between items-center mb-8">
                <h3 id="form-title" class="text-xl font-bold">บันทึกรายการ</h3>
                <button onclick="closeForm()" class="text-slate-400 text-2xl">&times;</button>
            </div>

            <form id="tx-form" class="space-y-6">
                <input type="hidden" id="field-id">
                
                <div class="flex p-1.5 bg-slate-100 rounded-2xl">
                    <button type="button" onclick="setMode('income')" id="btn-inc" class="flex-1 py-3 rounded-xl text-sm font-bold transition-all">รายรับ</button>
                    <button type="button" onclick="setMode('expense')" id="btn-exp" class="flex-1 py-3 rounded-xl text-sm font-bold transition-all">รายจ่าย</button>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">จำนวนเงิน</label>
                    <input type="number" id="field-amount" required step="0.01" placeholder="0.00" class="w-full text-4xl font-bold py-3 outline-none border-b-2 border-slate-100 focus:border-blue-600 transition-colors">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">รายละเอียด</label>
                        <input type="text" id="field-note" required placeholder="ระบุรายการ..." class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">วันที่</label>
                        <input type="date" id="field-date" required class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none">
                    </div>
                    <div id="pending-toggle" class="hidden flex items-center justify-between bg-slate-50 p-4 rounded-2xl">
                        <span class="text-xs font-bold text-slate-500">ค้างชำระ?</span>
                        <input type="checkbox" id="field-pending" class="w-5 h-5 accent-blue-600">
                    </div>
                </div>

                <button type="submit" id="btn-save" class="w-full py-5 bg-blue-600 text-white rounded-[2rem] font-bold shadow-xl shadow-blue-100 active:scale-90 transition-transform">
                    บันทึกรายการ
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "smartbill-v2";

        let user = null;
        let data = [];
        let currentType = 'income';
        let currentView = 'paid';

        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        init();

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) {
                document.getElementById('user-display-id').textContent = `ผู้ใช้: ${u.uid.substring(0, 8)}`;
                document.getElementById('user-full-id').textContent = `ID: ${u.uid}`;
                sync();
                loadNotifSettings();
            }
        });

        function sync() {
            if (!user) return;
            const col = collection(db, 'artifacts', appId, 'users', user.uid, 'transactions');
            const q = query(col, orderBy('date', 'desc'));
            
            onSnapshot(q, (snap) => {
                data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Firestore Error:", err));
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const filtered = data.filter(item => (item.isPending || false) === (currentView === 'pending'));

            let inc = 0, exp = 0;
            data.filter(item => !item.isPending).forEach(item => {
                if(item.type === 'income') inc += Number(item.amount);
                else exp += Number(item.amount);
            });

            document.getElementById('total-inc').textContent = inc.toLocaleString('th-TH', { minimumFractionDigits: 2 });
            document.getElementById('total-exp').textContent = exp.toLocaleString('th-TH', { minimumFractionDigits: 2 });
            document.getElementById('total-balance').textContent = (inc - exp).toLocaleString('th-TH', { minimumFractionDigits: 2 }) + " ฿";
            document.getElementById('stat-count').textContent = data.length;
            
            const pendingCount = data.filter(i => i.isPending).length;
            const badge = document.getElementById('badge-pending');
            if(badge) {
                if(pendingCount > 0) {
                    badge.textContent = pendingCount;
                    badge.classList.remove('hidden');
                } else badge.classList.add('hidden');
            }

            const overdue = data.filter(i => i.isPending && i.date < today);
            const banner = document.getElementById('overdue-banner');
            if (banner) banner.classList.toggle('hidden', overdue.length === 0);

            const container = document.getElementById('list-container');
            if (container) {
                container.innerHTML = filtered.length ? '' : '<div class="py-20 text-center text-slate-300 font-light">ยังไม่มีรายการในส่วนนี้</div>';
                
                filtered.forEach(item => {
                    const isOverdue = item.isPending && item.date < today;
                    const div = document.createElement('div');
                    div.className = `glass p-4 rounded-3xl flex justify-between items-center border-l-4 ${isOverdue ? 'border-orange-500' : (item.type === 'income' ? 'border-emerald-500' : 'border-slate-200')} animate-up`;
                    div.innerHTML = `
                        <div class="flex items-center gap-4 cursor-pointer" onclick="window.editItem('${item.id}')">
                            <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${item.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                                <i class="fas ${item.type === 'income' ? 'fa-arrow-down' : 'fa-arrow-up'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">${item.note}</p>
                                <p class="text-[10px] text-slate-400">${item.date}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold ${item.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">${Number(item.amount).toLocaleString()}</p>
                            ${item.isPending ? `<button onclick="window.markPaid('${item.id}')" class="text-[10px] font-bold text-blue-600 mt-1 bg-blue-50 px-2 py-0.5 rounded-full">ชำระแล้ว</button>` : `<button onclick="window.delItem('${item.id}')" class="text-[10px] text-slate-300 uppercase tracking-tighter">ลบ</button>`}
                        </div>
                    `;
                    container.appendChild(div);
                });
            }

            const dateDisplay = document.getElementById('display-date');
            if (dateDisplay) dateDisplay.textContent = new Date().toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
            
            // ตรวจสอบการแจ้งเตือนแบบเรียลไทม์
            if(localStorage.getItem('notif_enabled') === 'true') {
                checkNotifications(today);
            }
        }

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active', 'text-blue-600');
                n.classList.add('text-slate-300');
            });
            const activeNav = document.getElementById(`nav-${id}`);
            if (activeNav) {
                activeNav.classList.add('active', 'text-blue-600');
                activeNav.classList.remove('text-slate-300');
            }
        };

        window.changeView = (v) => {
            currentView = v;
            document.getElementById('tab-paid').className = v === 'paid' ? "pb-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600" : "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400";
            document.getElementById('tab-pending').className = v === 'pending' ? "pb-2 text-sm font-bold border-b-2 border-blue-600 text-blue-600" : "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400";
            render();
        };

        window.openForm = (id = null) => {
            document.getElementById('tx-form').reset();
            document.getElementById('field-id').value = '';
            document.getElementById('field-date').value = new Date().toISOString().split('T')[0];
            setMode('expense');
            if(id) {
                const item = data.find(i => i.id === id);
                if(item) {
                    document.getElementById('field-id').value = item.id;
                    document.getElementById('field-amount').value = item.amount;
                    document.getElementById('field-note').value = item.note;
                    document.getElementById('field-date').value = item.date;
                    document.getElementById('field-pending').checked = item.isPending;
                    setMode(item.type);
                }
            }
            document.getElementById('modal-form').classList.remove('hidden');
        };

        window.closeForm = () => document.getElementById('modal-form').classList.add('hidden');
        window.openFilter = () => changeView(currentView === 'paid' ? 'pending' : 'paid');

        window.setMode = (m) => {
            currentType = m;
            const inc = document.getElementById('btn-inc');
            const exp = document.getElementById('btn-exp');
            const toggle = document.getElementById('pending-toggle');
            if(m === 'income') {
                inc.className = "flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm text-emerald-600";
                exp.className = "flex-1 py-3 rounded-xl text-sm font-bold text-slate-400";
                toggle.classList.add('hidden');
            } else {
                exp.className = "flex-1 py-3 rounded-xl text-sm font-bold bg-white shadow-sm text-rose-600";
                inc.className = "flex-1 py-3 rounded-xl text-sm font-bold text-slate-400";
                toggle.classList.remove('hidden');
            }
        };

        document.getElementById('tx-form').onsubmit = async (e) => {
            e.preventDefault();
            if(!user) return;
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = "กำลังประมวลผล...";
            const id = document.getElementById('field-id').value;
            const payload = {
                type: currentType,
                amount: parseFloat(document.getElementById('field-amount').value),
                note: document.getElementById('field-note').value,
                date: document.getElementById('field-date').value,
                isPending: currentType === 'expense' ? document.getElementById('field-pending').checked : false,
                updatedAt: serverTimestamp()
            };
            try {
                if(id) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id), payload);
                else await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'transactions'), { ...payload, createdAt: serverTimestamp() });
                closeForm();
            } catch (err) { console.error(err); } 
            finally { btn.disabled = false; btn.textContent = "บันทึกรายการ"; }
        };

        window.markPaid = async (id) => {
            if(!user) return;
            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id), {
                isPending: false,
                date: new Date().toISOString().split('T')[0]
            });
        };

        window.delItem = async (id) => {
            if(!user || !confirm("ยืนยันการลบรายการนี้?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id));
        };

        window.editItem = (id) => window.openForm(id);

        // ระบบเปิด-ปิด การแจ้งเตือน
        window.toggleNotifications = (enabled) => {
            if(enabled) {
                if(!("Notification" in window)) {
                    alert("เบราว์เซอร์นี้ไม่รองรับการแจ้งเตือน");
                    document.getElementById('notif-toggle').checked = false;
                    return;
                }
                Notification.requestPermission().then(p => {
                    if(p === 'granted') {
                        localStorage.setItem('notif_enabled', 'true');
                        updateNotifUI(true);
                        new Notification("SmartBill", { body: "เปิดระบบการแจ้งเตือนสำเร็จ" });
                    } else {
                        localStorage.setItem('notif_enabled', 'false');
                        updateNotifUI(false);
                        document.getElementById('notif-toggle').checked = false;
                    }
                });
            } else {
                localStorage.setItem('notif_enabled', 'false');
                updateNotifUI(false);
            }
        };

        function loadNotifSettings() {
            const isEnabled = localStorage.getItem('notif_enabled') === 'true';
            document.getElementById('notif-toggle').checked = isEnabled;
            updateNotifUI(isEnabled);
        }

        function updateNotifUI(isEnabled) {
            const status = document.getElementById('notif-status');
            if (status) {
                status.textContent = isEnabled ? 'เปิดใช้งานแล้ว' : 'ปิดอยู่ (คลิกเปิด)';
                status.className = isEnabled ? 'text-[10px] text-blue-500 font-bold' : 'text-[10px] text-slate-400 font-light italic';
            }
        }

        function checkNotifications(today) {
            if(Notification.permission !== 'granted') return;
            data.filter(item => item.isPending && item.date === today).forEach(item => {
                // ป้องกันแจ้งเตือนซ้ำใน session เดียวกัน
                const notifId = `notif_${item.id}_${today}`;
                if(!sessionStorage.getItem(notifId)) {
                    new Notification("กำหนดชำระวันนี้!", { body: `${item.note}: ${item.amount} ฿` });
                    sessionStorage.setItem(notifId, 'true');
                }
            });
        }
    </script>
</body>
</html>
